name: Publish Hugging Face Space

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - deploy/huggingface/**
      - .github/workflows/huggingface-space.yml

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Hugging Face CLI
        run: python -m pip install --disable-pip-version-check "huggingface_hub>=0.29,<2"
      - name: Publish static Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          HfApi(token=os.environ["HF_TOKEN"]).upload_folder(
              repo_id="zrk222/code-factory",
              repo_type="space",
              folder_path="deploy/huggingface",
              path_in_repo=".",
              commit_message=f"Publish Code Factory Space from {os.environ['GITHUB_SHA']}",
          )
          PY
