name: publish

on:
  release:
    types: [published]

jobs:
  build-test-publish:
    name: build, test, attach, publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Install build tools
        run: python -m pip install --upgrade build twine pytest

      - name: Test
        run: python -m pytest -q

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Test and package VS Code extension
        working-directory: editors/vscode
        run: |
          npm ci
          npm test
          npx vsce package --no-dependencies --out factoryline-vscode-${{ github.event.release.tag_name }}.vsix

      - name: Test and package JetBrains plugin
        working-directory: editors/intellij
        run: |
          chmod +x gradlew
          ./gradlew check buildPlugin verifyPlugin marketplacePreflight

      - name: Clean wheel smoke
        run: |
          python -m venv /tmp/factory-wheel
          /tmp/factory-wheel/bin/python -m pip install dist/*.whl
          /tmp/factory-wheel/bin/factory --help
          if /tmp/factory-wheel/bin/factory trace empty --root /tmp/empty; then
            echo "empty trace unexpectedly verified" >&2
            exit 1
          fi

      - name: Attach distributions to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* editors/vscode/*.vsix editors/intellij/build/distributions/*.zip --clobber

      - name: Publish package distributions to PyPI
        # Temporary encrypted-token fallback. Replace with pure OIDC after
        # PyPI Trusted Publishing is configured for this repository.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
