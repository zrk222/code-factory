name: publish

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: validate release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v6.2.0

      - name: Install release test and build tools
        run: |
          python -m pip install --upgrade build twine
          python -m pip install -e ".[dev,enterprise]"

      - name: Test
        run: python -m pytest -q

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Test and package VS Code extension
        working-directory: editors/vscode
        run: |
          npm ci
          npm test
          npx vsce package --no-dependencies --out factoryline-vscode-${{ github.event.release.tag_name }}.vsix

      - name: Test and package JetBrains plugin
        working-directory: editors/intellij
        run: |
          chmod +x gradlew
          ./gradlew check buildPlugin verifyPlugin marketplacePreflight

      - name: Clean wheel smoke
        run: |
          python -m venv /tmp/factory-wheel
          /tmp/factory-wheel/bin/python -m pip install dist/*.whl
          /tmp/factory-wheel/bin/factory --help
          if /tmp/factory-wheel/bin/factory trace empty --root /tmp/empty; then
            echo "empty trace unexpectedly verified" >&2
            exit 1
          fi

      - name: Stage immutable release bundle
        run: |
          mkdir -p release-bundle/python release-bundle/editors
          cp dist/* release-bundle/python/
          cp editors/vscode/*.vsix release-bundle/editors/
          cp editors/intellij/build/distributions/*.zip release-bundle/editors/

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-bundle-${{ github.event.release.tag_name }}
          path: release-bundle/
          if-no-files-found: error
          retention-days: 30

  publish:
    name: publish verified release
    needs: validate
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v8.0.1
        with:
          name: release-bundle-${{ github.event.release.tag_name }}
          path: release-bundle

      - name: Attach distributions to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${{ github.event.release.tag_name }}"
          release-bundle/python/*
          release-bundle/editors/*
          docs/assets/code-factory-quickstart-v0171.mp4
          docs/assets/code-factory-quickstart-cover-v0171.png
          docs/assets/how-it-works/*.png
          docs/assets/*.svg
          docs/assets/verify-policy.gif
          --clobber

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release-bundle/python/
          attestations: true
