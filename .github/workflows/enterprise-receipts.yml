name: enterprise-receipts

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  offline-foundation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install enterprise extra
        run: python -m pip install -e ".[dev,enterprise]"
      - name: Run offline foundation tests
        run: python -m pytest -q tests/test_enterprise_receipts.py
      - name: Confirm enterprise CLI is available
        run: python -m factoryline.cli enterprise --help
