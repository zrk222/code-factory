name: ci
on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,enterprise]"
      - name: Test
        run: python -m pytest -q

  package-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Build and inspect distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - name: Prove the wheel installs without the source tree
        run: |
          python -m venv /tmp/factory-wheel
          /tmp/factory-wheel/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/factory-wheel/bin/factory --help
          /tmp/factory-wheel/bin/python -c "import factoryline; print(factoryline.__version__)"
      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  five-brick-prooflab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Check out the four independent bricks
        run: |
          git clone --depth 1 https://github.com/zrk222/code-factory-1-spec ../code-factory-1-spec
          git clone --depth 1 https://github.com/zrk222/code-factory-2-forge ../code-factory-2-forge
          git clone --depth 1 https://github.com/zrk222/code-factory-3-compile ../code-factory-3-compile
          git clone --depth 1 https://github.com/zrk222/code-factory-4-design ../code-factory-4-design
      - name: Install source train
        run: >-
          python -m pip install -e .
          -e ../code-factory-1-spec
          -e ../code-factory-2-forge
          -e ../code-factory-3-compile
          -e ../code-factory-4-design
      - run: factory doctor --strict
      - name: Build and verify five-brick Factory Passport
        run: python scripts/prooflab_e2e.py
