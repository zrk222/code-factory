name: IntelliJ plugin

on:
  push:
    paths:
      - "editors/intellij/**"
      - ".github/workflows/intellij-plugin.yml"
  pull_request:
    paths:
      - "editors/intellij/**"
      - ".github/workflows/intellij-plugin.yml"
  workflow_dispatch:

jobs:
  test-package-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/intellij
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - run: ./gradlew check buildPlugin verifyPlugin
      - uses: actions/upload-artifact@v4
        with:
          name: factoryline-intellij-plugin
          path: editors/intellij/build/distributions/*.zip

  compatibility:
    needs: test-package-verify
    strategy:
      fail-fast: false
      matrix:
        product:
          - IntellijIdea
          - PyCharm
          - WebStorm
          - Rider
          - CLion
          - GoLand
          - RustRover
          - DataGrip
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/intellij
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - run: ./gradlew buildPlugin verifyPlugin -PfactorylineVerificationProduct=${{ matrix.product }}
