<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Code Factory target compiler</title>
  <desc id="desc">One intent branches into worker, web, mobile, and agent operator targets, then passes through proof and human release approval.</desc>
  <rect width="1600" height="900" fill="#f6f8fa"/>
  <text x="100" y="105" fill="#172033" font-family="Arial, sans-serif" font-size="58" font-weight="700">One intent. Four software targets.</text>
  <text x="100" y="158" fill="#526171" font-family="Arial, sans-serif" font-size="25">Every starter begins blocked and carries a source-bound receipt.</text>
  <rect x="100" y="270" width="245" height="150" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="222" y="330" text-anchor="middle" fill="#172033" font-family="Arial, sans-serif" font-size="22" font-weight="700">INTENT / PRD</text>
  <text x="222" y="372" text-anchor="middle" fill="#526171" font-family="Arial, sans-serif" font-size="19">One exact source</text>
  <path d="M345 345 H430" stroke="#64748b" stroke-width="5" fill="none"/>
  <polygon points="430,345 413,335 413,355" fill="#64748b"/>
  <g font-family="Arial, sans-serif">
    <rect x="445" y="225" width="210" height="105" rx="8" fill="#fff7ed" stroke="#c2410c" stroke-width="3"/>
    <text x="550" y="270" text-anchor="middle" fill="#172033" font-size="22" font-weight="700">WORKER</text><text x="550" y="300" text-anchor="middle" fill="#526171" font-size="17">Deterministic Python</text>
    <rect x="680" y="225" width="210" height="105" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="785" y="270" text-anchor="middle" fill="#172033" font-size="22" font-weight="700">WEB</text><text x="785" y="300" text-anchor="middle" fill="#526171" font-size="17">Next.js + FastAPI</text>
    <rect x="445" y="360" width="210" height="105" rx="8" fill="#ecfccb" stroke="#65a30d" stroke-width="3"/>
    <text x="550" y="405" text-anchor="middle" fill="#172033" font-size="22" font-weight="700">MOBILE</text><text x="550" y="435" text-anchor="middle" fill="#526171" font-size="17">Expo SDK 57 CNG</text>
    <rect x="680" y="360" width="210" height="105" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
    <text x="785" y="405" text-anchor="middle" fill="#172033" font-size="22" font-weight="700">AGENT UI</text><text x="785" y="435" text-anchor="middle" fill="#526171" font-size="17">Preview + approval</text>
  </g>
  <path d="M890 345 H985" stroke="#64748b" stroke-width="5" fill="none"/>
  <polygon points="985,345 968,335 968,355" fill="#64748b"/>
  <rect x="1000" y="270" width="230" height="150" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="1115" y="325" text-anchor="middle" fill="#172033" font-family="Arial, sans-serif" font-size="22" font-weight="700">PROOF CONTRACT</text>
  <text x="1115" y="360" text-anchor="middle" fill="#526171" font-family="Arial, sans-serif" font-size="18">SSAT + smoke + hashes</text>
  <text x="1115" y="390" text-anchor="middle" fill="#526171" font-family="Arial, sans-serif" font-size="18">Promotion blocked</text>
  <path d="M1230 345 H1315" stroke="#64748b" stroke-width="5" fill="none"/>
  <polygon points="1315,345 1298,335 1298,355" fill="#64748b"/>
  <rect x="1330" y="270" width="190" height="150" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="1425" y="325" text-anchor="middle" fill="#172033" font-family="Arial, sans-serif" font-size="22" font-weight="700">HUMAN SHIP</text>
  <text x="1425" y="360" text-anchor="middle" fill="#526171" font-family="Arial, sans-serif" font-size="18">Approve release</text>
  <text x="1425" y="390" text-anchor="middle" fill="#526171" font-family="Arial, sans-serif" font-size="18">after real gates</text>
  <rect x="100" y="590" width="1420" height="180" rx="8" fill="#111827"/>
  <text x="145" y="650" fill="#93c5fd" font-family="Arial, sans-serif" font-size="18" font-weight="700">DEFAULT AUTHORITY</text>
  <text x="145" y="705" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Local files and checks only</text>
  <text x="730" y="705" fill="#fbbf24" font-family="Arial, sans-serif" font-size="28">No publish, deploy, signing, credentials, connectors, or external messages</text>
</svg>
