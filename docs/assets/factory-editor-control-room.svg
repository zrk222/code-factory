<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">Code Factory local editor control surfaces</title>
  <desc id="description">VS Code and JetBrains IDEs run explicit local FactoryLine commands. The CLI orchestrates five proof bricks and writes receipts for CI and review.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 36px Arial, sans-serif; fill: #10233f; letter-spacing: 0; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .label { font: 700 19px Arial, sans-serif; fill: #10233f; }
      .detail { font: 400 14px Arial, sans-serif; fill: #334155; }
      .small { font: 600 13px Arial, sans-serif; fill: #475569; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect x="28" y="24" width="1144" height="582" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="66" y="83" class="title">CODE FACTORY: LOCAL PROOF LOOP</text>
  <text x="66" y="115" class="subtitle">Editors trigger explicit local commands. FactoryLine CLI remains the receipt and release-proof authority.</text>

  <rect x="66" y="172" width="190" height="94" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="92" y="210" class="label">VS Code</text>
  <text x="92" y="237" class="detail">local command + receipt view</text>

  <rect x="66" y="300" width="190" height="126" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="92" y="339" class="label">JetBrains IDEs</text>
  <text x="92" y="366" class="detail">IntelliJ, PyCharm, WebStorm</text>
  <text x="92" y="389" class="detail">and six shared-platform peers</text>

  <path d="M256 219 H344" class="line"/>
  <path d="M256 363 H344" class="line"/>

  <rect x="346" y="216" width="236" height="160" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/>
  <text x="383" y="262" class="label">FactoryLine CLI</text>
  <text x="383" y="292" class="detail">assemble | verify | risk-diff</text>
  <text x="383" y="319" class="detail">direct executable, no shell</text>
  <text x="383" y="346" class="detail">confirmation before local work</text>

  <path d="M582 296 H637" class="line"/>

  <rect x="640" y="150" width="142" height="74" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
  <text x="674" y="193" class="label">SpecLine</text>
  <rect x="800" y="150" width="142" height="74" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="832" y="193" class="label">ForgeLine</text>
  <rect x="960" y="150" width="142" height="74" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="1012" y="193" class="label">HSF</text>
  <rect x="720" y="274" width="142" height="74" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="757" y="317" class="label">Prestige</text>
  <rect x="880" y="274" width="142" height="74" rx="8" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
  <text x="910" y="317" class="label">FactoryLine</text>

  <path d="M711 224 V249 H822 V274" class="line"/>
  <path d="M871 224 V249 H822" class="line"/>
  <path d="M1031 224 V249 H951 V274" class="line"/>
  <path d="M791 348 V409" class="line"/>
  <path d="M951 348 V409" class="line"/>

  <rect x="687" y="412" width="278" height="92" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="3"/>
  <text x="755" y="451" class="label">Local receipts + passport</text>
  <text x="755" y="478" class="detail">unassessed until explicitly verified</text>

  <path d="M826 504 V548" class="line"/>
  <rect x="712" y="551" width="228" height="32" rx="6" fill="#10233f"/>
  <text x="772" y="573" style="font:700 14px Arial,sans-serif;fill:#ffffff">CI, review, and release proof</text>

  <text x="66" y="555" class="small">No source upload. No editor-side signing. No synthetic pass badge.</text>
</svg>
